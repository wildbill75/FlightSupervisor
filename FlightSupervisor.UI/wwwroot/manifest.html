<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>TRUE AIRMANSHIP | Flight Manifest</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        background: "#141414",
                        surface: "#1a1b21",
                        "surface-dark": "#0f172a",
                    },
                    fontFamily: {
                        headline: ["Manrope", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                        label: ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #141414;
            color: #b6b6b6;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
            height: 100vh;
        }
        .window-drag-area { -webkit-app-region: drag; }
        .no-drag { -webkit-app-region: no-drag; }

        /* Zoom & Pan Container */
        #seatMapWrapper {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #seatMapWrapper:active { cursor: grabbing; }
        
        #seatMapZoomContainer {
            transform-origin: center center;
            transition: transform 0.1s ease-out;
            pointer-events: none; /* children re-enable pointer events */
        }
        #seatMapZoomContainer * { pointer-events: auto; }

        /* Manifest Specific Styles */
        .fuselage {
            width: 380px;
            border: 3px solid #334155;
            border-radius: 120px 120px 30px 30px;
            padding: 120px 20px 40px 20px;
            background: linear-gradient(to bottom, #0f172a, #111827);
            position: relative;
            margin: 0 auto;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
        }
        .cockpit {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 48px;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.1));
            border-radius: 60px 60px 15px 15px;
            border: 2px solid #475569;
        }
        .seat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            align-items: center;
            position: relative;
        }
        .row-num {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            color: #475569;
            font-size: 11px;
            font-weight: 800;
            z-index: 5;
            pointer-events: none;
        }
        .seat-block {
            display: flex;
            gap: 4px;
        }
        .seat {
            width: 22px;
            height: 26px;
            border-radius: 4px 4px 2px 2px;
            background: #1e293b;
            border: 1px solid #334155;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .seat:hover { transform: translateY(-2px); }
        
        .seat.fastened {
            background: #cbd5e1 !important;
            border-color: #f8fafc !important;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }
        .seat.unfastened {
            background: #f97316 !important;
            border-color: #fb923c !important;
            box-shadow: 0 0 10px rgba(249, 115, 22, 0.3);
        }
        .tooltip {
            visibility: hidden;
            width: 160px;
            background-color: #1a1b21;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 8px;
            position: absolute;
            z-index: 100;
            bottom: 140%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 10px;
            border: 1px solid #334155;
            pointer-events: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .seat:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body class="bg-[#141414] text-[#b6b6b6] overflow-hidden select-none">
    <div class="h-screen w-screen flex flex-col">
        <!-- Title Bar -->
        <div id="top-bar" class="window-drag-area flex-none flex items-center justify-between px-4 h-10 bg-[#1d1d1d] border-b border-white/5" onmousedown="if(window.chrome && window.chrome.webview) window.chrome.webview.postMessage({action:'drag'});">
            <!-- Logo / Title -->
            <div class="text-[10px] font-label tracking-[0.4em] text-[#7b7b7b] uppercase pointer-events-none select-none whitespace-nowrap truncate flex-1">TRUE AIRMANSHIP | FLIGHT & CABIN MANIFEST</div>
            
            <!-- CENTERED -->
            <div class="flex items-center justify-center gap-6 text-[12px] font-bold text-[#b6b6b6] font-mono tracking-wider pointer-events-none select-none whitespace-nowrap truncate flex-1">
            </div>

            <!-- Right Side Icons -->
            <div class="flex items-center gap-2 justify-end flex-1">
                <button class="no-drag w-8 h-8 flex items-center justify-center text-[#b6b6b6] hover:text-white hover:bg-white/10 rounded transition-colors" title="Always on Top" onmousedown="event.stopPropagation()" onclick="this.classList.toggle('text-[#b6b6b6]'); this.classList.toggle('text-sky-400'); if(window.chrome && window.chrome.webview) window.chrome.webview.postMessage({action: 'togglePinApp'});">
                    <span class="material-symbols-outlined text-[14px]">push_pin</span>
                </button>
                <button class="no-drag w-8 h-8 flex items-center justify-center text-[#b6b6b6] hover:text-white hover:bg-white/10 rounded transition-colors" title="Minimize" onmousedown="event.stopPropagation()" onclick="if(window.chrome && window.chrome.webview) window.chrome.webview.postMessage({action: 'minimizeApp'});">
                    <span class="material-symbols-outlined text-[14px]">remove</span>
                </button>
                <button class="no-drag w-8 h-8 flex items-center justify-center text-[#b6b6b6] hover:text-white hover:bg-white/10 rounded transition-colors" title="Maximize" onmousedown="event.stopPropagation()" onclick="if(window.chrome && window.chrome.webview) window.chrome.webview.postMessage({action: 'maximizeApp'});">
                    <span class="material-symbols-outlined text-[14px]">crop_square</span>
                </button>
                <button class="no-drag w-8 h-8 flex items-center justify-center text-[#b6b6b6] hover:text-white hover:bg-rose-500 rounded transition-colors" title="Close" onmousedown="event.stopPropagation()" onclick="if(window.chrome && window.chrome.webview) window.chrome.webview.postMessage({action: 'closeApp'});">
                    <span class="material-symbols-outlined text-[14px]">close</span>
                </button>
            </div>
        </div>
        
        <!-- Content Root -->
        <div id="manifestContainer" class="flex-1 overflow-hidden p-8">
            <div class="flex flex-col items-center justify-center h-full gap-4">
                <span class="material-symbols-outlined text-4xl text-[#475569]">flight_land</span>
                <p class="text-[#475569] font-black animate-pulse uppercase tracking-[0.3em] text-xl text-center max-w-md">Load a flight plan to display the cabin manifest</p>
            </div>
        </div>
    </div>
    <script src="manifest.js"></script>
</body>
</html>
