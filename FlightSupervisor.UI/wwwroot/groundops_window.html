<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>TRUE AIRMANSHIP | Ground Operations</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="app.css?v=6">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        background: "#141414",
                        primary: "#95ccff",
                        "primary-container": "#00a8ff",
                    },
                    fontFamily: {
                        headline: ["Manrope", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #141414;
            color: #b6b6b6;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
            height: 100vh;
        }
        .window-drag-area {
            -webkit-app-region: drag;
            position: fixed; top: 0; left: 0; right: 0; height: 30px; z-index: 9999;
        }
        .no-drag { -webkit-app-region: no-drag; }
        .glass-panel {
            background: rgba(51, 53, 58, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(136, 146, 157, 0.1);
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(62, 72, 82, 0.3); border-radius: 999px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(62, 72, 82, 0.6); }
    </style>
</head>
<body class="bg-[#141414] text-white overflow-hidden select-none">
    <div class="h-screen w-screen flex flex-col disable-drag">
        <!-- Title Bar -->
        <div class="h-10 border-b border-white/5 flex items-center justify-between px-4 bg-[#1C1F26] custom-drag">
            <span class="text-[9px] font-bold uppercase tracking-[0.3em] text-[#7b7b7b]">Ground Operations</span>
            <div class="flex items-center gap-2 no-drag">
                <button onclick="window.close()" class="px-2 hover:bg-red-500/20 text-[#b6b6b6] transition-colors rounded">
                    <span class="material-symbols-outlined text-[14px]">close</span>
                </button>
            </div>
        </div>
        
        <!-- Content -->
        <div class="flex-1 overflow-y-auto custom-scrollbar p-6">
            <div id="groundOpsContainer" class="w-full">
                <p class="text-[#7b7b7b] font-mono text-center mt-10" data-i18n="ground_pending">Waiting for ground crew reports...</p>
            </div>
        </div>
    </div>
    
    <!-- Time Skip Hook (Simplified) -->
    <script>
        window.openTimeSkip = function() {
            window.chrome.webview.postMessage({ action: 'openTimeSkipDialog' }); // Or whatever trigger
        };
    </script>

    <script src="locales.js"></script>
    <script src="groundops_window.js"></script>
</body>
</html>
