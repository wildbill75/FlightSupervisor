<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>TRUE AIRMANSHIP | Simulator Sandbox Mode</title>
    <script src="tailwind.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        background: "#141414",
                        surface: "#1a1b21",
                        "surface-dark": "#0f172a",
                    },
                    fontFamily: {
                        headline: ["Manrope", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                        label: ["Inter", "sans-serif"]
                    }
                }
            }
        };
    </script>
    <style>
        body { background-color: transparent; font-family: 'Inter', sans-serif; overflow: hidden; }
        .draggable-handle { -webkit-app-region: drag; }
        .no-drag { -webkit-app-region: no-drag; }
        ::-webkit-scrollbar { width: 4px; border-radius: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="p-2 h-screen flex flex-col">
    <!-- Body -->
    <div class="bg-[#141414] border border-rose-500/30 rounded-xl w-full h-full shadow-[0_0_40px_rgba(225,29,72,0.15)] flex flex-col overflow-hidden">
        <!-- Header -->
        <div class="h-12 w-full border-b border-rose-500/20 relative flex items-center justify-between px-4 draggable-handle bg-rose-900/10 shrink-0">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-rose-400">science</span>
                <h2 class="text-xs font-label tracking-widest text-rose-400 uppercase font-black drop-shadow-md">Simulator Sandbox Mode</h2>
            </div>
            
            <div class="flex items-center no-drag">
                <button onclick="window.chrome.webview.postMessage({action: 'closeSandboxWindow'})" class="w-8 h-8 rounded-full hover:bg-white/10 flex items-center justify-center text-white/40 hover:text-white transition-colors group">
                    <span class="material-symbols-outlined text-[16px]">close</span>
                </button>
            </div>
        </div>

        <!-- Scrollable Content -->
        <div class="p-6 flex-1 overflow-y-auto font-manrope">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <p class="text-[12px] text-rose-200/70 leading-relaxed max-w-sm font-semibold">Mock telemetry offline to test game loops without MSFS. Easily manipulate physical limits and phase transitions.</p>
                    <p class="text-[10px] py-1 px-2 border border-rose-500/30 text-rose-300 uppercase inline-block mt-3 font-bold tracking-widest">⚠️ Do not use while actively flying in MSFS</p>
                </div>
                <label class="relative inline-flex items-center cursor-pointer ml-4">
                    <input type="checkbox" id="chkSimMode" class="sr-only peer" onchange="window.chrome.webview.postMessage({action: 'debugToggleSimulation', enabled: this.checked});">
                    <div class="w-11 h-6 bg-rose-950 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-rose-500"></div>
                </label>
            </div>
            
            <div class="flex justify-between items-center mb-5 mt-8 border-t border-rose-500/20 pt-6">
                <span class="text-[11px] font-bold tracking-[0.2em] text-[#7b7b7b] uppercase">Fast Forward</span>
                <div class="flex gap-2">
                    <button onclick="window.chrome.webview.postMessage({action: 'debugTimeSkip', minutes: 1})" class="bg-[#1a1c23] hover:bg-white/10 text-white/50 hover:text-white border border-white/5 px-3 py-1.5 rounded text-[11px] uppercase font-bold tracking-widest transition-colors shadow-sm">+ 1m</button>
                    <button onclick="window.chrome.webview.postMessage({action: 'debugTimeSkip', minutes: 5})" class="bg-[#1a1c23] hover:bg-white/10 text-white/50 hover:text-white border border-white/5 px-3 py-1.5 rounded text-[11px] uppercase font-bold tracking-widest transition-colors shadow-sm">+ 5m</button>
                    <button onclick="window.chrome.webview.postMessage({action: 'debugTimeSkip', minutes: 15})" class="bg-[#1a1c23] hover:bg-white/10 text-white/50 hover:text-white border border-white/5 px-3 py-1.5 rounded text-[11px] uppercase font-bold tracking-widest transition-colors shadow-sm">+ 15m</button>
                </div>
            </div>

            <span class="text-[11px] font-bold tracking-[0.2em] text-[#7b7b7b] uppercase block mb-4 mt-8">Phase Manipulator</span>
            <div class="grid grid-cols-2 gap-3 pb-2">
                <button onclick="window.chrome.webview.postMessage({action: 'debugForcePhase', phase: 'AtGate'})" class="bg-black/50 border border-rose-500/20 text-rose-300 py-4 px-2 rounded-md hover:bg-rose-500/30 transition-colors uppercase font-mono text-[11px] tracking-widest font-black">AT GATE</button>
                <button onclick="window.chrome.webview.postMessage({action: 'debugForcePhase', phase: 'Pushback'})" class="bg-black/50 border border-rose-500/20 text-rose-300 py-4 px-2 rounded-md hover:bg-rose-500/30 transition-colors uppercase font-mono text-[11px] tracking-widest font-black">PUSHBACK</button>
                <button onclick="window.chrome.webview.postMessage({action: 'debugForcePhase', phase: 'Takeoff'})" class="bg-black/50 border border-rose-500/20 text-rose-300 py-4 px-2 rounded-md hover:bg-rose-500/30 transition-colors uppercase font-mono text-[11px] tracking-widest font-black">TAKEOFF (+15m)</button>
                <button onclick="window.chrome.webview.postMessage({action: 'debugForcePhase', phase: 'Cruise'})" class="bg-black/50 border border-sky-500/20 text-sky-400 py-4 px-2 rounded-md hover:bg-sky-500/30 transition-colors uppercase font-mono text-[11px] tracking-widest font-black shadow-[0_0_15px_rgba(14,165,233,0.1)]">CRUISE (+30m)</button>
                <button onclick="window.chrome.webview.postMessage({action: 'debugForcePhase', phase: 'Descent'})" class="col-span-2 bg-black/50 border border-amber-500/20 text-amber-400 py-4 px-2 rounded-md hover:bg-amber-500/30 transition-colors uppercase font-mono text-[11px] tracking-widest font-black">DESCENT (+ETE)</button>
            </div>

            <span class="text-[11px] font-bold tracking-[0.2em] text-[#7b7b7b] uppercase block mb-4 mt-8">Manual Telemetry</span>
            <div class="grid grid-cols-2 gap-3 pb-2">
                <button id="btn-Eng1" onclick="toggleTelemetry('Eng1')" class="bg-black/50 border border-slate-500/40 text-slate-300 py-3 px-2 rounded-md hover:bg-slate-500/40 transition-colors uppercase font-mono text-[11px] tracking-widest font-black">ENG 1: ON</button>
                <button id="btn-Eng2" onclick="toggleTelemetry('Eng2')" class="bg-black/50 border border-slate-500/40 text-slate-300 py-3 px-2 rounded-md hover:bg-slate-500/40 transition-colors uppercase font-mono text-[11px] tracking-widest font-black">ENG 2: ON</button>
                
                <button id="btn-Seatbelts" onclick="toggleTelemetry('Seatbelts')" class="bg-black/50 border border-slate-500/40 text-slate-300 py-3 px-2 rounded-md hover:bg-slate-500/40 transition-colors uppercase font-mono text-[11px] tracking-widest font-black">SEATBELTS: ON</button>
                <button id="btn-Beacon" onclick="toggleTelemetry('Beacon')" class="bg-black/50 border border-amber-500/40 text-amber-500 py-3 px-2 rounded-md hover:bg-amber-500/20 transition-colors uppercase font-mono text-[11px] tracking-widest font-black">BEACON: ON</button>
                
                <button id="btn-ParkingBrake" onclick="toggleTelemetry('ParkingBrake')" class="col-span-2 bg-rose-950/20 border border-rose-500/40 text-rose-400 py-3 px-2 rounded-md hover:bg-rose-500/30 transition-colors uppercase font-mono text-[11px] tracking-widest font-black">PARKING BRAKE: OFF</button>
            </div>


            
            <div class="mt-8 border-t border-rose-500/20 pt-6">
                 <button onclick="window.chrome.webview.postMessage({action: 'generateDebugDump'})" class="w-full bg-[#1c1c1c] border border-white/10 text-[#7b7b7b] hover:text-white hover:bg-white/10 hover:border-white/20 py-3 rounded-md transition-colors uppercase font-mono text-[10px] tracking-widest font-bold flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-[16px]">bug_report</span>
                    Export Agent Debug Log
                 </button>
            </div>
        </div>
    </div>
    
    <script>
        let telemetry = { Eng1: true, Eng2: true, Seatbelts: true, Beacon: true, ParkingBrake: false };

        function toggleTelemetry(key) {
            telemetry[key] = !telemetry[key];
            const btn = document.getElementById(`btn-${key}`);
            const val = telemetry[key];
            
            if (val) {
                btn.classList.remove('text-rose-400', 'border-rose-500/40', 'bg-rose-950/20');
                btn.classList.add('text-slate-300', 'border-slate-500/40', 'bg-black/50');
                if (key === 'Beacon') {
                    btn.classList.replace('text-slate-300', 'text-amber-500');
                    btn.classList.replace('border-slate-500/40', 'border-amber-500/40');
                } else if (key === 'ParkingBrake') {
                    btn.classList.replace('text-slate-300', 'text-emerald-400');
                    btn.classList.replace('border-slate-500/40', 'border-emerald-500/40');
                }
                let label = key === 'ParkingBrake' ? 'PARKING BRAKE' : key.toUpperCase().replace('ENG', 'ENG ');
                btn.innerText = `${label}: ON`;
            } else {
                btn.classList.remove('text-slate-300', 'text-amber-500', 'text-emerald-400', 'border-slate-500/40', 'border-amber-500/40', 'border-emerald-500/40', 'bg-black/50');
                btn.classList.add('text-rose-400', 'border-rose-500/40', 'bg-rose-950/20');
                let label = key === 'ParkingBrake' ? 'PARKING BRAKE' : key.toUpperCase().replace('ENG', 'ENG ');
                btn.innerText = `${label}: OFF`;
            }

            if (key === 'Beacon' && !val) btn.innerText += " (TRIGGER TURNAROUND)";
            if (key === 'ParkingBrake' && val) btn.innerText += " (TRIGGER ARRIVED)";

            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage({action: 'sandboxToggle', key: key, value: val});
            }
        }

        window.chrome.webview.addEventListener('message', event => {
            const msg = event.data;
            if (msg.type === "init") {
                document.getElementById('chkSimMode').checked = msg.simModeEnabled;
            }
        });
    </script>
</body>
</html>
