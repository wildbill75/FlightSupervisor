<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>TRUE AIRMANSHIP | Flight Logs</title>
    <script src="tailwind.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        background: "#141414",
                        surface: "#1a1b21",
                        "surface-dark": "#0f172a",
                    },
                    fontFamily: {
                        headline: ["Manrope", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                        label: ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #141414;
            color: #b6b6b6;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
            height: 100vh;
        }
        .window-drag-area {
            -webkit-app-region: drag;
        }
        .no-drag { -webkit-app-region: no-drag; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        
        /* Scrollbars */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(62, 72, 82, 0.3); border-radius: 999px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(62, 72, 82, 0.6); }
    </style>
</head>
<body class="bg-[#141414] text-[#b6b6b6] overflow-hidden select-none">
    <div class="h-screen w-screen flex flex-col disable-drag">
        <!-- Title Bar -->
        <div id="top-bar" class="window-drag-area flex-none flex items-center justify-between px-4 h-10 bg-[#1d1d1d] border-b border-white/5" onmousedown="if(window.chrome && window.chrome.webview) window.chrome.webview.postMessage({action:'drag'});">
            <!-- Logo / Title -->
            <div class="text-[10px] font-label tracking-[0.4em] text-[#7b7b7b] uppercase pointer-events-none select-none whitespace-nowrap truncate flex-1">TRUE AIRMANSHIP | FLIGHT LOGS</div>
            
            <!-- CENTERED -->
            <div class="flex items-center justify-center gap-6 text-[12px] font-bold text-[#b6b6b6] font-mono tracking-wider pointer-events-none select-none whitespace-nowrap truncate flex-1">
            </div>

            <!-- Right Side Icons -->
            <div class="flex items-center gap-2 justify-end flex-1">
                <button class="no-drag w-8 h-8 flex items-center justify-center text-[#b6b6b6] hover:text-white hover:bg-white/10 rounded transition-colors" title="Always on Top" onmousedown="event.stopPropagation()" onclick="this.classList.toggle('text-[#b6b6b6]'); this.classList.toggle('text-sky-400'); if(window.chrome && window.chrome.webview) window.chrome.webview.postMessage({action: 'togglePinApp'});">
                    <span class="material-symbols-outlined text-[14px]">push_pin</span>
                </button>
                <button class="no-drag w-8 h-8 flex items-center justify-center text-[#b6b6b6] hover:text-white hover:bg-white/10 rounded transition-colors" title="Minimize" onmousedown="event.stopPropagation()" onclick="if(window.chrome && window.chrome.webview) window.chrome.webview.postMessage({action: 'minimizeLogsWindow'});">
                    <span class="material-symbols-outlined text-[14px]">remove</span>
                </button>
                <button class="no-drag w-8 h-8 flex items-center justify-center text-[#b6b6b6] hover:text-white hover:bg-white/10 rounded transition-colors" title="Maximize" onmousedown="event.stopPropagation()" onclick="if(window.chrome && window.chrome.webview) window.chrome.webview.postMessage({action: 'maximizeLogsWindow'});">
                    <span class="material-symbols-outlined text-[14px]">crop_square</span>
                </button>
                <button class="no-drag w-8 h-8 flex items-center justify-center text-[#b6b6b6] hover:text-white hover:bg-rose-500 rounded transition-colors" title="Close" onmousedown="event.stopPropagation()" onclick="if(window.chrome && window.chrome.webview) window.chrome.webview.postMessage({action: 'closeLogsWindow'});">
                    <span class="material-symbols-outlined text-[14px]">close</span>
                </button>
            </div>
        </div>

        <!-- Body -->
        <div class="flex-1 flex flex-col p-6 overflow-hidden">
            <!-- Live Phase Checklist -->
            <div class="bg-[#1a1b21] rounded-xl border border-white/10 mb-6 shrink-0 overflow-hidden flex flex-col max-h-[40%] shadow-lg">
                <div class="px-4 py-2 bg-sky-900/20 border-b border-sky-500/20 flex items-center justify-between shrink-0">
                    <span class="text-[10px] uppercase tracking-widest text-sky-400 font-bold flex items-center gap-2">
                        <span class="material-symbols-outlined text-[14px]">checklist</span>
                        ACTIVE PHASE
                    </span>
                    <span id="activePhaseName" class="text-[10px] uppercase tracking-widest text-white font-black bg-sky-500/20 px-2 py-0.5 rounded">AWAITING</span>
                </div>
                <div class="p-3 overflow-y-auto flex-1 custom-scrollbar">
                    <div id="activePhaseRules" class="space-y-0.5">
                        <div class="text-xs text-slate-500 font-mono italic text-center py-4">No active checklist</div>
                    </div>
                </div>
            </div>

            <!-- Live Telemetry -->
            <div class="bg-[#1a1b21] rounded-xl border border-white/10 mb-6 shrink-0 overflow-hidden flex flex-col shadow-lg">
                <div class="px-4 py-2 bg-emerald-900/20 border-b border-emerald-500/20 flex items-center justify-between shrink-0">
                    <span class="text-[10px] uppercase tracking-widest text-emerald-400 font-bold flex items-center gap-2">
                        <span class="material-symbols-outlined text-[14px]">speed</span>
                        LIVE TELEMETRY
                    </span>
                </div>
                <div class="p-3 grid grid-cols-4 gap-2">
                    <div class="bg-black/40 border border-white/5 rounded p-2 flex flex-col items-center">
                        <span class="text-[8px] text-slate-500 uppercase font-bold tracking-wider mb-1">SPD</span>
                        <span id="telSpeed" class="text-xs font-mono font-bold text-white">---</span>
                    </div>
                    <div class="bg-black/40 border border-white/5 rounded p-2 flex flex-col items-center">
                        <span class="text-[8px] text-slate-500 uppercase font-bold tracking-wider mb-1">ALT</span>
                        <span id="telAlt" class="text-xs font-mono font-bold text-white">---</span>
                    </div>
                    <div class="bg-black/40 border border-white/5 rounded p-2 flex flex-col items-center">
                        <span class="text-[8px] text-slate-500 uppercase font-bold tracking-wider mb-1">VS</span>
                        <span id="telVs" class="text-xs font-mono font-bold text-white">---</span>
                    </div>
                    <div class="bg-black/40 border border-white/5 rounded p-2 flex flex-col items-center">
                        <span class="text-[8px] text-slate-500 uppercase font-bold tracking-wider mb-1">PITCH</span>
                        <span id="telPitch" class="text-xs font-mono font-bold text-white">---</span>
                    </div>
                    <div class="bg-black/40 border border-white/5 rounded p-2 flex flex-col items-center">
                        <span class="text-[8px] text-slate-500 uppercase font-bold tracking-wider mb-1">BANK</span>
                        <span id="telBank" class="text-xs font-mono font-bold text-white">---</span>
                    </div>
                    <div class="bg-black/40 border border-white/5 rounded p-2 flex flex-col items-center">
                        <span class="text-[8px] text-slate-500 uppercase font-bold tracking-wider mb-1">G-FORCE</span>
                        <span id="telGforce" class="text-xs font-mono font-bold text-white">---</span>
                    </div>
                    <div class="bg-black/40 border border-white/5 rounded p-2 flex flex-col items-center">
                        <span class="text-[8px] text-slate-500 uppercase font-bold tracking-wider mb-1">FLAPS</span>
                        <span id="telFlaps" class="text-xs font-mono font-bold text-white">---</span>
                    </div>
                    <div class="bg-black/40 border border-white/5 rounded p-2 flex flex-col items-center">
                        <span class="text-[8px] text-slate-500 uppercase font-bold tracking-wider mb-1">GEAR</span>
                        <span id="telGear" class="text-xs font-mono font-bold text-white">---</span>
                    </div>
                </div>
            </div>
            
            <!-- Score Display -->
            <div class="bg-black/40 rounded-xl p-4 border border-emerald-500/20 text-center mb-6 shrink-0 relative overflow-hidden group">
                <div class="absolute inset-0 bg-emerald-500/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <p class="text-[9px] text-emerald-400/60 uppercase tracking-[0.4em] font-bold mb-1">SUPER SCORE</p>
                <span id="topScoreValue" class="text-5xl font-black text-white font-headline tracking-tight drop-shadow-[0_0_15px_rgba(255,255,255,0.4)]">---</span>
            </div>
            
            <!-- Log List -->
            <div class="flex-1 overflow-hidden flex flex-col bg-[#141414] border border-white/5 rounded-lg shadow-inner">
                <div class="px-4 py-2 bg-[#1a1a1a] border-b border-white/5 flex items-center shrink-0">
                    <span class="text-[9px] uppercase tracking-widest text-[#7b7b7b] font-bold flex items-center gap-2">
                        <span class="material-symbols-outlined text-[12px]">history</span>
                        Event History
                    </span>
                </div>
                <ul id="penaltyLogs" class="p-2 flex-1 overflow-y-auto space-y-1 custom-scrollbar">
                    <!-- JS injected logs -->
                </ul>
            </div>
        </div>
    </div>
    <script>
        let currentChecklistPhase = "";

        function freezeChecklistToHistory(phaseStr) {
            const rulesContainer = document.getElementById('activePhaseRules');
            if (!rulesContainer || rulesContainer.children.length === 0 || rulesContainer.innerText.includes("No active checklist")) return;
            
            const logs = document.getElementById('penaltyLogs');
            
            const wrapper = document.createElement('li');
            wrapper.className = "bg-[#111111] border border-white/10 rounded-md my-2 p-3 shadow-md";
            
            const title = document.createElement('div');
            title.className = "text-[10px] font-bold text-sky-400 tracking-widest mb-2 border-b border-white/10 pb-1 flex items-center gap-2";
            title.innerHTML = `<span class="material-symbols-outlined text-[14px]">done_all</span> PHASE ENDED: ${phaseStr.toUpperCase()}`;
            wrapper.appendChild(title);
            
            const clone = rulesContainer.cloneNode(true);
            clone.id = ""; // remove id so it's not duplicated
            
            // Convert current items in clone to static snapshot
            clone.querySelectorAll('div').forEach(el => {
                // Dim the text slightly for history
                if(el.classList.contains('text-[#b6b6b6]')) el.classList.replace('text-[#b6b6b6]', 'text-slate-500');
            });
            
            wrapper.appendChild(clone);
            logs.appendChild(wrapper);
            logs.scrollTop = logs.scrollHeight;
        }

        // Set up C# message listener
        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.addEventListener('message', event => {
                const payload = event.data;
                if (!payload || !payload.type) return;

                if (payload.type === 'initLogs') {
                    if (payload.score) document.getElementById('topScoreValue').innerText = payload.score;
                    if (payload.history) {
                        const logs = document.getElementById('penaltyLogs');
                        logs.innerHTML = payload.history;
                        logs.scrollTop = logs.scrollHeight;
                    }
                } 
                else if (payload.type === 'telemetryUpdate') {
                    if (payload.telemetry) {
                        const t = payload.telemetry;
                        document.getElementById('telSpeed').innerText = Math.round(t.speed) + ' KT';
                        document.getElementById('telAlt').innerText = Math.round(t.altitude) + ' FT';
                        document.getElementById('telVs').innerText = Math.round(t.vs) + ' FPM';
                        document.getElementById('telPitch').innerText = t.pitch.toFixed(1) + '°';
                        document.getElementById('telBank').innerText = t.bank.toFixed(1) + '°';
                        document.getElementById('telGforce').innerText = t.gforce.toFixed(2) + ' G';
                        document.getElementById('telFlaps').innerText = t.flaps.toFixed(0);
                        document.getElementById('telGear').innerText = t.gear;
                    }
                }
                else if (payload.type === 'phaseChecklist') {
                    const rules = payload.rules || [];
                    const phase = payload.phase || "UNKNOWN";
                    
                    if (currentChecklistPhase !== "" && currentChecklistPhase !== phase) {
                        freezeChecklistToHistory(currentChecklistPhase);
                    }
                    currentChecklistPhase = phase;
                    
                    document.getElementById('activePhaseName').innerText = phase.toUpperCase();
                    
                    const container = document.getElementById('activePhaseRules');
                    container.innerHTML = '';
                    
                    if (rules.length === 0) {
                        container.innerHTML = '<div class="text-xs text-slate-500 font-mono italic text-center py-4">No checklist items for this phase</div>';
                    } else {
                        rules.forEach(r => {
                            const itemName = r.ItemName || r.itemName;
                            const expected = r.Expected || r.expected;
                            const actual = r.Actual || r.actual;
                            const isPass = r.IsPass !== undefined ? r.IsPass : r.isPass;
                            
                            const div = document.createElement('div');
                            div.className = "flex items-center justify-between text-[11px] py-1 border-b border-white/5 last:border-0";
                            
                            const labelDiv = document.createElement('div');
                            labelDiv.className = "text-[#b6b6b6] font-mono tracking-wide";
                            labelDiv.innerText = itemName;
                            
                            const statusDiv = document.createElement('div');
                            statusDiv.className = isPass 
                                ? "text-emerald-400 font-bold font-mono tracking-widest bg-emerald-500/10 px-2 py-0.5 rounded" 
                                : "text-rose-500 font-bold font-mono tracking-widest bg-rose-500/10 px-2 py-0.5 rounded animate-pulse";
                            
                            statusDiv.innerText = isPass ? expected : (actual ? actual : "FAIL");
                            
                            div.appendChild(labelDiv);
                            div.appendChild(statusDiv);
                            container.appendChild(div);
                        });
                    }
                }
                else if (payload.type === 'penalty') {
                    const logs = document.getElementById('penaltyLogs');
                    if (logs && payload.message) {
                        const logLi = document.createElement('li');
                        logLi.className = 'text-red-400 font-mono text-sm py-1 border-b border-red-900/30';
                        
                        const now = new Date();
                        const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}z`;
                        
                        logLi.innerText = `[${timeStr}] ${payload.message} (Total: ${payload.score})`;
                        logs.appendChild(logLi);
                        logs.scrollTop = logs.scrollHeight;
                    }
                    if (payload.score !== undefined) {
                        document.getElementById('topScoreValue').innerText = payload.score;
                    }
                }
                else if (payload.type === 'scoreUpdate') {
                    const logs = document.getElementById('penaltyLogs');
                    if (logs) {
                        const finalScore = payload.score !== undefined ? payload.score : (payload.Score !== undefined ? payload.Score : 1000);
                        const finalDelta = payload.delta !== undefined ? payload.delta : (payload.Delta !== undefined ? payload.Delta : 0);
                        const finalMsg = payload.msg || payload.message || payload.Msg || '';
                        
                        if (finalMsg) {
                            const logLi = document.createElement('li');
                            const now = new Date();
                            const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}z`;
                            
                            logLi.innerText = `[${timeStr}] ${finalMsg} (Total: ${finalScore})`;
                            
                            if (finalDelta === 0) {
                                logLi.className = 'text-[#cbd5e1] font-mono text-sm py-1 border-b border-white/10';
                            } else {
                                logLi.className = finalDelta > 0 
                                    ? 'text-emerald-300 font-mono text-sm py-1 border-b border-emerald-900/30' 
                                    : 'text-red-400 font-mono text-sm py-1 border-b border-red-900/30';
                            }
                            
                            logs.appendChild(logLi);
                            logs.scrollTop = logs.scrollHeight;
                        }
                        
                        document.getElementById('topScoreValue').innerText = finalScore;
                    }
                }
                else if (payload.type === 'log') {
                    const logs = document.getElementById('penaltyLogs');
                    if (logs && payload.message) {
                        const logLi = document.createElement('li');
                        logLi.className = 'text-[#cbd5e1] font-mono text-sm py-1 border-b border-white/10';
                        
                        const now = new Date();
                        const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}z`;
                        
                        logLi.innerText = `[${timeStr}] ${payload.message}`;
                        logs.appendChild(logLi);
                        logs.scrollTop = logs.scrollHeight;
                    }
                }
            });

            // Signal C# backend that the window has fully loaded
            window.chrome.webview.postMessage({ action: 'logsWindowReady' });
        }
    </script>
</body>
</html>
